<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Outer rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="#111118" stroke="url(#grad)" stroke-width="8"/>
  <!-- Dashboard grid: 4 panels -->
  <!-- Top-left: large stat panel -->
  <rect x="80" y="80" width="200" height="120" rx="16" fill="url(#grad2)"/>
  <!-- Top-right: small panel -->
  <rect x="296" y="80" width="136" height="120" rx="16" fill="url(#grad2)"/>
  <!-- Bottom-left: small panel -->
  <rect x="80" y="216" width="136" height="120" rx="16" fill="url(#grad2)"/>
  <!-- Bottom-right: large panel -->
  <rect x="232" y="216" width="200" height="120" rx="16" fill="url(#grad2)"/>
  <!-- Accent bar in top-left panel (like a chart bar) -->
  <rect x="100" y="148" width="80" height="32" rx="8" fill="url(#grad)" opacity="0.9"/>
  <rect x="100" y="116" width="52" height="24" rx="6" fill="url(#grad)" opacity="0.5"/>
  <!-- Accent dot in top-right panel -->
  <circle cx="364" cy="140" r="24" fill="url(#grad)" opacity="0.7"/>
  <!-- Accent lines in bottom-left -->
  <rect x="100" y="256" width="96" height="8" rx="4" fill="url(#grad)" opacity="0.6"/>
  <rect x="100" y="276" width="68" height="8" rx="4" fill="url(#grad)" opacity="0.4"/>
  <rect x="100" y="296" width="80" height="8" rx="4" fill="url(#grad)" opacity="0.5"/>
  <!-- Accent bar chart in bottom-right -->
  <rect x="260" y="296" width="24" height="24" rx="4" fill="url(#grad)" opacity="0.5"/>
  <rect x="292" y="276" width="24" height="44" rx="4" fill="url(#grad)" opacity="0.65"/>
  <rect x="324" y="256" width="24" height="64" rx="4" fill="url(#grad)" opacity="0.8"/>
  <rect x="356" y="236" width="24" height="84" rx="4" fill="url(#grad)" opacity="0.95"/>
  <!-- "CB" text at bottom -->
  <text x="256" y="420" text-anchor="middle" font-family="monospace" font-weight="700" font-size="72" fill="url(#grad)">CB</text>
</svg>
